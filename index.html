<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Send Message</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url('bg.jpg') no-repeat center center;
  background-size:cover;
}

/* container */
.container{
  width:90%;
  max-width:420px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

/* heading */
h1{
  font-size:22px;
  margin-bottom:10px;
  color:#fff;
}

.sub{
  font-size:13px;
  opacity:0.7;
  margin-bottom:20px;
  color:#ccc;
}

/* textarea */
textarea{
  width:100%;
  height:110px;
  border:none;
  outline:none;
  border-radius:12px;
  padding:12px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-size:14px;
  resize:none;
}

/* button */
button{
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#00f5d4;
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  opacity:0.85;
}

/* toast */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:#111;
  padding:10px 18px;
  border-radius:10px;
  color:#00f5d4;
  opacity:0;
  transition:0.4s;
}

.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

.footer{
  margin-top:10px;
  font-size:11px;
  opacity:0.5;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">
  <h1>Anonymous Message 💌</h1>
  <div class="sub">Say anything. No one will know 👀</div>

  <textarea id="msg" placeholder="Type your message..."></textarea>

  <button id="sendBtn">Send 🚀</button>

  <div class="footer">Created by Shashi</div>
</div>

<!-- 🔊 SOUND -->
<audio id="clickSound" src="click.mp3"></audio>

<div id="toast" class="toast">Message Sent 👀</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 IMPORTS (important)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔴 TERA CONFIG (same rehne de)
const firebaseConfig = {
  apiKey: "AIzaSyBGsE_Z0iAKi-53395fE02kTO4SFKnkHYY",
  authDomain: "anonymous-1c3db.firebaseapp.com",
  projectId: "anonymous-1c3db",
  storageBucket: "anonymous-1c3db.firebasestorage.app",
  messagingSenderId: "636989934464",
  appId: "1:636989934464:web:064bbe1c2d0e648cba0f65",
  measurementId: "G-205ZR4KNHK"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 SEND FUNCTION (IMPORTANT)
document.getElementById("sendBtn").addEventListener("click", async () => {

  let msg = document.getElementById("msg").value;

  if(msg.trim()==="") return;

  try{
    await addDoc(collection(db,"messages"),{
      text: msg,
      time: Date.now()
    });

    document.getElementById("msg").value="";
    alert("Message sent 🔥");

  }catch(e){
    alert("Error: " + e.message);
    console.log(e);
  }

});
</script>

</body>
</html>
